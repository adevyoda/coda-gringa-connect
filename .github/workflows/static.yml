# Sample workflow for building and deploying a Vite React app to GitHub Pages
# based on the standard Node.js / HTML static template, adjusted for Vite build
# Modified to build from the 'cng' subfolder.

name: Deploy Vite React App to Pages # Nome atualizado para refletir o conteúdo

on:
  push:
    branches:
      - main # Altere para a sua branch principal se for diferente (ex: master)
    # Removendo a trigger por tags, pois geralmente não é necessária para deploys de Pages
    # tags:
    #   - '*'
  workflow_dispatch: # Permite rodar o workflow manualmente na aba Actions

# Sets permissions of the GITHUB_ACTOR to approve the deployment of the site.
permissions:
  contents: read
  pages: write # Permissão necessária para implantar no GitHub Pages
  id-token: write # Permissão necessária para a action deploy-pages

# Allow only one concurrent deployment, skipping runs queued between the runs that have been started.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Single deploy job since we're just deploying the frontend
  deploy:
    environment:
      name: github-pages # Nome do ambiente de deploy no GitHub Pages
      url: ${{ steps.deployment.outputs.page_url }} # URL da página implantada
    runs-on: ubuntu-latest # Usa o runner padrão do Ubuntu

    steps:
      - name: Checkout code # Passo para baixar o código do seu repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessário para a action deploy-pages

      - name: Setup Node.js # Passo para configurar o ambiente Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recomendo usar uma versão LTS recente do Node.js

      # --- NOVO PASSO: Navegar para a pasta do front-end ---
      - name: Navigate to frontend directory
        run: cd cng # <--- Adicionado: Entra na pasta 'cng' antes de rodar os comandos npm

      - name: Install dependencies # Passo para instalar as dependências do projeto
        # Este comando agora será executado DENTRO da pasta 'cng'
        run: npm install

      - name: Build project # Passo FUNDAMENTAL: Rodar o script de build do seu package.json
        # Este comando agora será executado DENTRO da pasta 'cng'
        run: npm run build

      - name: Setup Pages # Configura o ambiente para a action de deploy do Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact # Passo para subir os arquivos gerados pelo build
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload a pasta 'dist' que está DENTRO da pasta 'cng'
          # O caminho é relativo ao diretório de trabalho do workflow no momento do upload.
          # Como fizemos 'cd cng', o diretório de trabalho é agora 'cng/'.
          # Portanto, o caminho para a pasta dist é simplesmente './dist' *dentro* de 'cng'.
          path: './dist' # <--- Mantido como './dist', mas agora relativo à pasta 'cng'

      - name: Deploy to GitHub Pages # Passo final: Implanta os arquivos para o GitHub Pages
        id: deployment # ID para referenciar as saídas desta action
        uses: actions/deploy-pages@v4 # Action oficial para deploy no Pages

